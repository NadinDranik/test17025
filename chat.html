<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Общий чат — Гид PRO ГОСТ ISO/IEC 17025-2019</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
</head>
<body class="page-chat">

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__mark">17025</span>
        <span class="logo__text">Гид PRO</span>
      </a>
      <nav class="nav" aria-label="Основная навигация"></nav>
      <div class="header__actions"></div>
      <button class="burger" aria-label="Открыть меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div id="user-profile-bar" class="user-profile-bar" hidden></div>

  <main class="chat-layout">
    <div class="container chat-layout__inner">
      <aside class="chat-sidebar">
        <h1 class="chat-sidebar__title">Общий чат</h1>
        <p class="chat-sidebar__desc">Бесплатное профессиональное общение участников сообщества.</p>
        <div class="chat-sidebar__info" id="access-info" data-user-profile></div>
        <div class="search-box">
          <input type="search" class="form__input" id="search-input" placeholder="Поиск по сообщениям и файлам…">
          <button type="button" class="btn btn--outline btn--sm btn--block" id="search-btn">Найти</button>
        </div>
        <div id="search-results" class="search-results"></div>
      </aside>

      <section class="chat-main">
        <div class="chat-main__header">
          <h2>Общий чат сообщества</h2>
          <span class="chat-main__count" id="msg-count"></span>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-compose" id="compose-area">
          <div class="reply-preview" id="reply-preview" hidden>
            <span id="reply-text"></span>
            <button type="button" id="cancel-reply">&times;</button>
          </div>
          <form id="msg-form" class="chat-form">
            <textarea class="form__input chat-form__input" id="msg-text" rows="3" placeholder="Текст сообщения (необязательно, если есть файлы)…"></textarea>
            <div class="chat-form__row">
              <label class="file-upload">
                <input type="file" id="msg-files" multiple>
                <span class="btn btn--ghost btn--sm">📎 Прикрепить файлы</span>
              </label>
              <span class="file-upload__hint" id="file-names"></span>
              <button type="submit" class="btn btn--primary" data-label="Отправить">Отправить</button>
            </div>
            <p class="chat-form__hint">Можно отправить только текст, только файлы или оба. Фото, видео, PDF, Word, Excel, TXT и др. (до 25 МБ).</p>
            <p class="form__error" id="send-error" hidden></p>
          </form>
        </div>
        <div class="chat-guest-notice" id="guest-notice" hidden>
          <p>Для отправки сообщений необходимо <a href="login.html?next=chat.html">войти</a> или <a href="login.html?tab=register&next=chat.html">зарегистрироваться</a>.</p>
        </div>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat-send.js"></script>
  <script>
    const CHAT_ID = 'free';
    let currentUser = App.getCurrentUser();
    let replyToId = null;

    UI.initHeader('chat');

    const messagesEl = document.getElementById('messages');
    const composeArea = document.getElementById('compose-area');
    const guestNotice = document.getElementById('guest-notice');
    const accessInfo = document.getElementById('access-info');
    const msgForm = document.getElementById('msg-form');
    const sendError = document.getElementById('send-error');

    async function renderMessages() {
      const msgs = App.getMessages(CHAT_ID);
      document.getElementById('msg-count').textContent = msgs.length + ' сообщ.';
      await UI.renderMessages(messagesEl, msgs, currentUser, CHAT_ID, 'Пока нет сообщений. Будьте первым!');
    }

    function updateAccessUI() {
      currentUser = App.getCurrentUser();
      UI.refreshUserProfile();
      if (currentUser) {
        composeArea.hidden = false;
        guestNotice.hidden = true;
      } else {
        composeArea.hidden = true;
        guestNotice.hidden = false;
        accessInfo.innerHTML = '<p>Гости могут читать сообщения. Для публикации — войдите в систему.</p>';
      }
    }

    UI.bindMessageActions(messagesEl, CHAT_ID, currentUser, renderMessages);

    messagesEl.addEventListener('reply-to', e => {
      replyToId = e.detail.id;
      msgForm._replyTo = replyToId;
      document.getElementById('reply-preview').hidden = false;
      document.getElementById('reply-text').textContent = 'Ответ ' + e.detail.author + ': ' + ChatSend.getReplyLabel(e.detail);
      document.getElementById('msg-text').focus();
    });

    document.getElementById('cancel-reply').addEventListener('click', () => {
      replyToId = null;
      msgForm._replyTo = null;
      document.getElementById('reply-preview').hidden = true;
    });

    ChatSend.bindForm(
      msgForm,
      () => CHAT_ID,
      () => App.getCurrentUser(),
      () => {
        sendError.hidden = true;
        renderMessages();
      },
      (msg) => {
        sendError.textContent = msg;
        sendError.hidden = false;
      }
    );

    document.getElementById('search-btn').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      const resultsEl = document.getElementById('search-results');
      if (!q) { resultsEl.innerHTML = ''; return; }
      const results = App.searchMessages(q, [CHAT_ID]);
      resultsEl.innerHTML = results.length
        ? results.map(r => `<div class="search-result"><strong>${r.authorName || r.authorEmail}</strong><br>${UI.escapeHtml((r.text || r.files?.[0]?.name || '').slice(0, 100))}</div>`).join('')
        : '<p class="search-result search-result--empty">Ничего не найдено</p>';
    });

    updateAccessUI();
    renderMessages();
  </script>
</body>
</html>
