<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сайт временно недоступен — Гид PRO</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f2740;
      color: #e8f0f8;
      padding: 24px;
      text-align: center;
    }
    .box {
      max-width: 420px;
    }
    h1 {
      font-size: 1.35rem;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 20px;
      line-height: 1.5;
      opacity: 0.9;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      background: #2d6a9f;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Сайт временно недоступен</h1>
    <p>Сервер обновляется или перезапускается. Обычно это занимает меньше минуты.</p>
    <button type="button" onclick="location.reload()">Обновить страницу</button>
  </div>
</body>
</html>
