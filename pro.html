<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRO-раздел — Гид PRO ГОСТ ISO/IEC 17025-2019</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
</head>
<body class="page-chat page-pro">

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__mark">17025</span>
        <span class="logo__text">Гид PRO</span>
      </a>
      <nav class="nav" aria-label="Основная навигация"></nav>
      <div class="header__actions"></div>
      <button class="burger" aria-label="Открыть меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div id="user-profile-bar" class="user-profile-bar" hidden></div>

  <main class="chat-layout">
    <div class="chat-layout__inner pro-layout">
      <aside class="chat-sidebar chat-sidebar--pro pro-topics-panel">
        <div class="chat-sidebar__body">
        <h1 class="chat-sidebar__title">PRO-чаты</h1>
        <p class="chat-sidebar__desc">Закрытые темы, создаваемые администратором. Выберите тему для общения.</p>
        <div class="chat-sidebar__info" data-user-profile></div>
        <div class="search-box">
          <input type="search" class="form__input" id="search-input" placeholder="Поиск по темам и сообщениям…">
          <button type="button" class="btn btn--outline btn--sm btn--block" id="search-btn">Найти</button>
        </div>
        </div>
        <nav class="topic-list" id="topic-list" aria-label="PRO-темы"></nav>
      </aside>

      <section class="chat-main pro-chat-panel">
        <div class="chat-main__header">
          <button type="button" class="pro-chat-back" id="pro-chat-back" aria-label="К списку PRO-чатов">←</button>
          <h2 id="topic-title">Выберите тему</h2>
          <span class="chat-main__count" id="msg-count"></span>
        </div>
        <div id="no-topic" class="chat-empty chat-empty--center">
          <p>Выберите тему слева или дождитесь, пока администратор создаст PRO-чаты.</p>
        </div>
        <div class="chat-messages" id="messages" hidden></div>
        <div class="chat-compose" id="compose-area" hidden>
          <div class="reply-preview" id="reply-preview" hidden>
            <span id="reply-text"></span>
            <button type="button" id="cancel-reply">&times;</button>
          </div>
          <form id="msg-form" class="chat-form">
            <div class="chat-form__bar">
              <label class="chat-form__attach file-upload" title="Прикрепить файлы">
                <input type="file" id="msg-files" multiple>
                <span class="chat-form__attach-icon" aria-hidden="true">📎</span>
              </label>
              <textarea class="form__input chat-form__input" id="msg-text" rows="1" placeholder="Сообщение…"></textarea>
              <button type="submit" class="chat-form__send btn btn--pro" data-label="Отправить" aria-label="Отправить"><svg class="chat-form__send-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
            <p class="chat-form__files" id="file-names"></p>
            <p class="form__error" id="send-error" hidden></p>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat-send.js"></script>
  <script>
    App.ready.then(() => {
    let currentUser = App.getCurrentUser();
    if (!currentUser) {
      window.location.href = App.getLoginUrl('pro.html');
    } else if (!App.isProActive(currentUser)) {
      window.location.href = 'pro-request.html';
    }

    let activeTopicId = null;
    const msgForm = document.getElementById('msg-form');
    const sendError = document.getElementById('send-error');

    UI.initHeader('pro');
    UI.refreshUserProfile();

    const topicListEl = document.getElementById('topic-list');
    const messagesEl = document.getElementById('messages');
    const composeArea = document.getElementById('compose-area');
    const noTopicEl = document.getElementById('no-topic');
    const mobileMq = window.matchMedia('(max-width: 992px)');

    function isMobileView() {
      return mobileMq.matches;
    }

    function openMobileChat() {
      document.body.classList.add('pro-chat-open');
    }

    function closeMobileChat(updateHistory) {
      document.body.classList.remove('pro-chat-open');
      if (updateHistory !== false && window.location.hash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }

    function renderTopics() {
      const topics = App.getProTopics(false);
      if (!topics.length) {
        topicListEl.innerHTML = '<p class="topic-list__empty">Тем пока нет. Администратор создаст их в панели управления.</p>';
        return;
      }
      topicListEl.innerHTML = topics.map(t => {
        const count = App.getMessages(t.id).length;
        const lastMsg = count ? App.getMessages(t.id)[count - 1] : null;
        const preview = lastMsg
          ? (lastMsg.text ? lastMsg.text.slice(0, 60) : (lastMsg.files?.[0]?.name ? '📎 ' + lastMsg.files[0].name : 'Сообщение'))
          : 'Нет сообщений';
        return `
        <button type="button" class="topic-item${activeTopicId === t.id ? ' topic-item--active' : ''}${t.pinned ? ' topic-item--pinned' : ''}"
          data-id="${t.id}">
          <span class="topic-item__title">${t.pinned ? '📌 ' : ''}${UI.escapeHtml(t.title)}</span>
          <span class="topic-item__meta">${count ? count + ' сообщ.' : 'Пусто'} · ${UI.escapeHtml(preview)}</span>
        </button>`;
      }).join('');

      topicListEl.querySelectorAll('.topic-item').forEach(btn => {
        btn.addEventListener('click', () => selectTopic(btn.dataset.id));
      });

      if (!activeTopicId && topics.length && !isMobileView()) {
        selectTopic(topics[0].id, { skipHistory: true });
      }
    }

    function selectTopic(id, options) {
      options = options || {};
      activeTopicId = id;
      const topics = App.getProTopics(false);
      const topic = topics.find(t => t.id === id);
      if (!topic) return;

      document.getElementById('topic-title').textContent = topic.title;
      noTopicEl.hidden = true;
      messagesEl.hidden = false;
      composeArea.hidden = false;

      if (isMobileView()) {
        openMobileChat();
        if (!options.skipHistory) {
          history.pushState({ proChat: id }, '', '#t=' + encodeURIComponent(id));
        }
      }

      renderTopics();
      renderMessages();
    }

    async function renderMessages() {
      if (!activeTopicId) return;
      const msgs = App.getMessages(activeTopicId);
      document.getElementById('msg-count').textContent = msgs.length + ' сообщ.';
      await UI.renderMessages(messagesEl, msgs, currentUser, activeTopicId, 'В этой теме пока нет сообщений.');
    }

    UI.bindMessageActions(messagesEl, () => activeTopicId, currentUser, () => {
      if (activeTopicId) renderMessages();
    });

    messagesEl.addEventListener('reply-to', e => {
      msgForm._replyTo = e.detail.id;
      document.getElementById('reply-preview').hidden = false;
      document.getElementById('reply-text').textContent = 'Ответ ' + e.detail.author + ': ' + ChatSend.getReplyLabel(e.detail);
      document.getElementById('msg-text').focus();
    });

    document.getElementById('cancel-reply').addEventListener('click', () => {
      msgForm._replyTo = null;
      document.getElementById('reply-preview').hidden = true;
    });

    ChatSend.bindForm(
      msgForm,
      () => activeTopicId,
      () => App.getCurrentUser(),
      () => {
        sendError.hidden = true;
        renderMessages();
        renderTopics();
      },
      (msg) => {
        sendError.textContent = msg;
        sendError.hidden = false;
      }
    );

    document.getElementById('search-btn').addEventListener('click', () => {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      const topicIds = App.getProTopics(false).map(t => t.id);
      const msgResults = App.searchMessages(q, topicIds);
      const topicResults = App.getProTopics(false).filter(t =>
        t.title.toLowerCase().includes(q.toLowerCase()) ||
        t.description.toLowerCase().includes(q.toLowerCase())
      );
      let html = '';
      if (topicResults.length) {
        html += '<p><strong>Темы:</strong></p>' + topicResults.map(t =>
          `<button type="button" class="topic-item topic-item--search" data-id="${t.id}">${t.title}</button>`
        ).join('');
      }
      if (msgResults.length) {
        html += '<p><strong>Сообщения:</strong></p>' + msgResults.map(r =>
          `<div class="search-result">${r.authorEmail}: ${UI.escapeHtml((r.text || r.files?.[0]?.name || '').slice(0, 80))}</div>`
        ).join('');
      }
      if (!html) html = '<p class="search-result--empty">Ничего не найдено</p>';
      const wrap = document.createElement('div');
      wrap.className = 'search-results';
      wrap.innerHTML = html;
      topicListEl.after(wrap);
      wrap.querySelectorAll('[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          selectTopic(btn.dataset.id);
          wrap.remove();
        });
      });
    });

    document.getElementById('pro-chat-back').addEventListener('click', () => {
      if (window.history.length > 1) {
        history.back();
      } else {
        closeMobileChat();
        activeTopicId = null;
        noTopicEl.hidden = false;
        messagesEl.hidden = true;
        composeArea.hidden = true;
        document.getElementById('topic-title').textContent = 'PRO-чаты';
        document.getElementById('msg-count').textContent = '';
        renderTopics();
      }
    });

    window.addEventListener('popstate', () => {
      if (!isMobileView()) return;
      if (window.location.hash.startsWith('#t=')) {
        const id = decodeURIComponent(window.location.hash.slice(3));
        if (App.getProTopics(false).some(t => t.id === id)) {
          selectTopic(id, { skipHistory: true });
        }
      } else {
        closeMobileChat(false);
        activeTopicId = null;
        noTopicEl.hidden = false;
        messagesEl.hidden = true;
        composeArea.hidden = true;
        document.getElementById('topic-title').textContent = 'PRO-чаты';
        document.getElementById('msg-count').textContent = '';
        renderTopics();
      }
    });

    mobileMq.addEventListener('change', () => {
      if (!isMobileView()) {
        closeMobileChat(false);
        if (!activeTopicId) {
          const topics = App.getProTopics(false);
          if (topics.length) selectTopic(topics[0].id, { skipHistory: true });
        }
      } else if (activeTopicId && window.location.hash.startsWith('#t=')) {
        openMobileChat();
      } else {
        closeMobileChat(false);
      }
    });

    renderTopics();

    (function initFromHash() {
      const match = window.location.hash.match(/^#t=(.+)$/);
      if (match && App.getProTopics(false).some(t => t.id === decodeURIComponent(match[1]))) {
        selectTopic(decodeURIComponent(match[1]), { skipHistory: true });
      }
    })();

    window.addEventListener('gost-data-synced', () => {
      renderTopics();
      if (activeTopicId) renderMessages();
    });
    });
  </script>
</body>
</html>
