<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Гид PRO ГОСТ ISO/IEC 17025-2019</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/visual-refresh.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="page-login">

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__mark">17025</span>
        <span class="logo__text">Гид PRO</span>
      </a>
    </div>
  </header>

  <main class="auth-page">
    <div class="container auth-page__inner">

      <div class="auth-tabs">
        <button type="button" class="auth-tab auth-tab--active" data-tab="login">Вход</button>
        <button type="button" class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <!-- Вход -->
      <section class="auth-panel" id="panel-login">
        <h1>Вход в сообщество</h1>
        <p class="auth-panel__desc">Войдите, чтобы пользоваться чатом и оформить PRO-доступ.</p>
        <form id="login-form" class="form">
          <label class="form__label">
            Email
            <input type="email" class="form__input" name="email" required placeholder="example@mail.ru" autocomplete="username">
          </label>
          <label class="form__label">
            Пароль
            <input type="password" class="form__input" name="password" required placeholder="Ваш пароль" autocomplete="current-password">
          </label>
          <p class="form__error" id="login-error" hidden></p>
          <button type="submit" class="btn btn--primary btn--block">Войти</button>
        </form>
      </section>

      <!-- Регистрация -->
      <section class="auth-panel" id="panel-register" hidden>
        <h1>Регистрация</h1>
        <p class="auth-panel__desc">Создайте аккаунт для доступа к сообществу.</p>
        <form id="register-form" class="form">
          <label class="form__label">
            Ник (отображается в чате)
            <input type="text" class="form__input" name="nickname" required placeholder="Например: LabExpert" minlength="2" maxlength="30">
          </label>
          <label class="form__label">
            Email
            <input type="email" class="form__input" name="email" required placeholder="example@mail.ru" autocomplete="username">
          </label>
          <label class="form__label">
            Пароль
            <input type="password" class="form__input" name="password" required placeholder="Не менее 8 символов" minlength="8" autocomplete="new-password">
          </label>
          <label class="form__label">
            Подтверждение пароля
            <input type="password" class="form__input" name="password_confirm" required placeholder="Повторите пароль" autocomplete="new-password">
          </label>
          <p class="form__error" id="register-error" hidden></p>
          <button type="submit" class="btn btn--primary btn--block">Зарегистрироваться</button>
        </form>
      </section>

      <a href="index.html" class="legal-back">← На главную</a>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script>
    App.ready.then(() => {
    UI.initPasswordToggles();

    const params = new URLSearchParams(window.location.search);
    const nextPage = params.get('next') || '';
    const tabParam = params.get('tab');

    if (tabParam === 'register') showTab('register');

    const existing = App.getCurrentUser();
    if (existing && !existing.blocked) {
      window.location.href = App.getRedirectAfterLogin(existing, nextPage);
    }

    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', () => showTab(tab.dataset.tab));
    });

    function showTab(name) {
      document.querySelectorAll('.auth-tab').forEach(t => {
        t.classList.toggle('auth-tab--active', t.dataset.tab === name);
      });
      document.getElementById('panel-login').hidden = name !== 'login';
      document.getElementById('panel-register').hidden = name !== 'register';
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.hidden = false;
    }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('login-error').hidden = true;
      const fd = new FormData(e.target);
      const result = await App.login(fd.get('email'), fd.get('password'));
      if (!result.ok) {
        showError('login-error', result.error);
        return;
      }
      window.location.href = App.getRedirectAfterLogin(result.user, nextPage);
    });

    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('register-error').hidden = true;
      const fd = new FormData(e.target);
      if (fd.get('password') !== fd.get('password_confirm')) {
        showError('register-error', 'Пароли не совпадают');
        return;
      }
      const result = await App.register(fd.get('email'), fd.get('password'), fd.get('nickname'));
      if (!result.ok) {
        showError('register-error', result.error);
        return;
      }
      window.location.href = 'pro-request.html';
    });
    });
  </script>
</body>
</html>
