<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личные сообщения администратору — Гид PRO ГОСТ ISO/IEC 17025-2019</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/mobile.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
</head>
<body class="page-chat page-admin-chat">

  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">
        <span class="logo__mark">17025</span>
        <span class="logo__text">Гид PRO</span>
      </a>
      <nav class="nav" aria-label="Основная навигация"></nav>
      <div class="header__actions"></div>
      <button class="burger" aria-label="Открыть меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="chat-layout">
    <div class="chat-layout__inner">
      <aside class="chat-sidebar">
        <nav class="chat-rail" aria-label="Чаты">
          <a href="chat.html" class="chat-rail__tab" data-chat-id="free">Общий</a>
          <a href="admin-chat.html" class="chat-rail__tab chat-rail__tab--active" data-chat-kind="dm" aria-current="page">Админ</a>
          <a href="pro-request.html" class="chat-rail__tab">PRO</a>
        </nav>
        <nav id="desktop-chats-nav" class="desktop-chats-nav" aria-label="Список чатов"></nav>
        <div class="chat-sidebar__body">
          <h1 class="chat-sidebar__title">Личные сообщения</h1>
          <p class="chat-sidebar__desc">Ваш личный диалог с администратором. Здесь можно задать вопрос, обратиться за помощью или отправить чек для оформления PRO-доступа.</p>
          <p class="chat-sidebar__note">Сообщения видны только вам и администратору.</p>
          <a href="pro-request.html" class="btn btn--outline btn--block">Оформить PRO-доступ</a>
        </div>
      </aside>

      <section class="chat-main">
        <div class="chat-main__header">
          <h2>Администратор</h2>
          <span class="chat-main__count" id="msg-count"></span>
        </div>

        <div class="chat-messages" id="messages"></div>

        <div class="chat-compose" id="compose-area">
          <div class="reply-preview" id="reply-preview" hidden>
            <span id="reply-text"></span>
            <button type="button" id="cancel-reply">&times;</button>
          </div>
          <form id="msg-form" class="chat-form">
            <div class="chat-form__bar">
              <label class="chat-form__attach file-upload" title="Прикрепить файл">
                <input type="file" id="msg-files" multiple accept="image/*,.pdf">
                <span class="chat-form__attach-icon" aria-hidden="true">📎</span>
              </label>
              <textarea class="form__input chat-form__input" id="msg-text" rows="1" placeholder="Напишите администратору…"></textarea>
              <button type="submit" class="chat-form__send btn btn--primary" data-label="Отправить" aria-label="Отправить"><svg class="chat-form__send-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
            </div>
            <p class="chat-form__files" id="file-names"></p>
            <p class="form__error" id="send-error" hidden></p>
          </form>
        </div>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/chat-send.js"></script>
  <script>
    App.ready.then(() => {
      let currentUser = App.getCurrentUser();

      if (!currentUser) {
        window.location.href = App.getLoginUrl('admin-chat.html');
        return;
      }

      if (currentUser.role === 'admin') {
        window.location.href = 'admin.html#messages';
        return;
      }

      const CHAT_ID = App.getAdminDmChatId(currentUser.id);

      UI.initHeader('admin-chat');
      Mobile.init('support');
      App.ensureAdminDmWelcome(currentUser.id);
      Mobile.mountDesktopChatsNav(CHAT_ID);

      const messagesEl = document.getElementById('messages');
      const msgForm = document.getElementById('msg-form');
      const sendError = document.getElementById('send-error');

      async function renderMessages() {
        currentUser = App.getCurrentUser();
        const msgs = App.getMessages(CHAT_ID);
        document.getElementById('msg-count').textContent = msgs.length + ' сообщ.';
        await UI.renderMessages(messagesEl, msgs, currentUser, CHAT_ID, 'Напишите администратору — ответ придёт в этот личный диалог.');
      }

      UI.bindMessageActions(messagesEl, CHAT_ID, currentUser, renderMessages);

      messagesEl.addEventListener('reply-to', e => {
        msgForm._replyTo = e.detail.id;
        document.getElementById('reply-preview').hidden = false;
        document.getElementById('reply-text').textContent = 'Ответ ' + e.detail.author + ': ' + ChatSend.getReplyLabel(e.detail);
        document.getElementById('msg-text').focus();
      });

      document.getElementById('cancel-reply').addEventListener('click', () => {
        msgForm._replyTo = null;
        document.getElementById('reply-preview').hidden = true;
      });

      ChatSend.bindForm(
        msgForm,
        () => CHAT_ID,
        () => App.getCurrentUser(),
        () => {
          sendError.hidden = true;
          renderMessages();
        },
        (msg) => {
          sendError.textContent = msg;
          sendError.hidden = false;
        }
      );

      renderMessages();
      window.addEventListener('gost-data-synced', renderMessages);
      window.addEventListener('gost-unread-changed', () => UI.refreshUnreadBadges());
    });
  </script>
</body>
</html>
