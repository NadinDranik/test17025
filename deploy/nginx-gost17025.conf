# Гид PRO — akkred17025.ru (статика с диска, API/HTML через Node)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://akkred17025.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name akkred17025.ru www.akkred17025.ru;
    return 301 https://akkred17025.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.akkred17025.ru;

    ssl_certificate /etc/letsencrypt/live/akkred17025.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akkred17025.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://akkred17025.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name akkred17025.ru;

    ssl_certificate /etc/letsencrypt/live/akkred17025.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akkred17025.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/gost17025;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ~* \.(css|js|png|webp|jpe?g|gif|svg|ico|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
